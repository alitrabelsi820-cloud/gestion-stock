<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/static/favicon-ref.svg">
    <link rel="manifest" href="/static/manifest-ref.json">
    <meta name="theme-color" content="#1abc9c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Références">
    <link rel="apple-touch-icon" href="/static/icons/icon-ref-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trabelsi — Fiche Référence — Gestion Inventaire</title>
<style>
:root{--gold:#b8923c;--gold-l:#c9a84c;--gold-d:#7a5c20;--bg:#f8f4ee;--card:#ffffff;--bd:rgba(184,146,60,.2);--txt:#1a1612;--muted:#9a8e7e;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:80px;}

/* Fond décoratif */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='50,8 57,38 87,38 64,56 72,86 50,68 28,86 36,56 13,38 43,38' fill='none' stroke='%23b8923c' stroke-width='0.6' opacity='0.11'/%3E%3C/svg%3E");
  background-size:100px 100px;}

/* Topbar */
.emp-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:#fff;
  border-bottom:1px solid rgba(184,146,60,.18);
  position:sticky;top:0;z-index:10;
  box-shadow:0 1px 8px rgba(0,0,0,.04);
}
.emp-topbar-brand{display:flex;align-items:center;gap:10px;}
.emp-topbar-logo{
  width:32px;height:32px;
  background:linear-gradient(135deg,#c9a84c,#7a5c20);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;color:#fff;font-family:'Segoe UI',Arial,sans-serif;
}
.emp-topbar-name{font-size:13px;font-weight:800;letter-spacing:3px;color:#b8923c;text-transform:uppercase;}
.emp-topbar-actions{display:flex;align-items:center;gap:8px;}
.emp-topbar-btn{
  width:36px;height:36px;border-radius:9px;
  border:1px solid rgba(184,146,60,.25);background:transparent;
  color:#9a8e7e;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:17px;position:relative;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.emp-topbar-btn:active{background:rgba(184,146,60,.1);color:#b8923c;}
.emp-badge{
  position:absolute;top:-4px;right:-4px;
  background:linear-gradient(135deg,#c9a84c,#7a5c20);
  color:#fff;border-radius:10px;padding:1px 5px;
  font-size:10px;font-weight:900;min-width:16px;text-align:center;
  display:none;border:1.5px solid #fff;
}

/* Content */
.emp-content{display:flex;flex-direction:column;gap:14px;padding:16px;}

/* Card */
.emp-card{background:#fff;border:1px solid rgba(184,146,60,.2);border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(184,146,60,.07);}
.emp-card-header{padding:14px 18px 12px;border-bottom:1px solid rgba(184,146,60,.1);display:flex;align-items:center;gap:8px;}
.emp-card-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-d);}

/* Fiche input */
.emp-fiche-row{display:flex;gap:8px;padding:14px 18px;}
.emp-fiche-input{
  flex:1;padding:12px 14px;background:rgba(184,146,60,.05);
  border:1px solid rgba(184,146,60,.25);border-radius:10px;
  font-size:15px;color:var(--txt);outline:none;
  font-family:'Segoe UI',Arial,sans-serif;transition:border-color .18s;
}
.emp-fiche-input:focus{border-color:var(--gold-l);background:#fff;}
.emp-fiche-input::placeholder{color:var(--muted);}
.emp-fiche-btn{
  padding:12px 16px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#c9a84c,#7a5c20);color:#fff;font-size:16px;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
.emp-fiche-btn:active{filter:brightness(.88);}
.emp-keep-btn{
  padding:12px 14px;border-radius:10px;border:1px solid rgba(184,146,60,.3);
  background:rgba(184,146,60,.06);color:var(--gold-d);font-size:13px;font-weight:700;
  cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all .15s;
}
.emp-keep-btn:active{background:rgba(184,146,60,.18);}
.emp-keep-btn:disabled{opacity:.35;cursor:not-allowed;}

/* Résultat fiche */
.emp-fiche-result{padding:0 14px 14px;}
.emp-fiche-card{border:1px solid rgba(184,146,60,.3);border-radius:12px;overflow:hidden;}
.emp-fiche-head{background:linear-gradient(135deg,#1a1200,#2d1f00);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.emp-fiche-ref{font-size:20px;font-weight:900;color:#c9a84c;font-family:monospace;}
.emp-fiche-nom{font-size:12px;color:rgba(201,168,76,.7);margin-top:2px;}
.emp-fiche-badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-stock{background:rgba(46,204,113,.2);border:1px solid #2ecc71;color:#2ecc71;}
.badge-vendu{background:rgba(231,76,60,.2);border:1px solid #e74c3c;color:#e74c3c;}
.badge-credit{background:rgba(230,126,34,.15);border:1px solid rgba(230,126,34,.5);color:#b85c00;}
.emp-fiche-photo-wrap{background:#f5f0e8;border-bottom:1px solid rgba(184,146,60,.12);display:flex;align-items:center;justify-content:center;padding:14px;min-height:160px;}
.emp-fiche-photo{max-height:200px;max-width:100%;object-fit:contain;border-radius:8px;}
.emp-fiche-rows{padding:10px 14px;display:flex;flex-direction:column;}
.emp-row-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(184,146,60,.07);font-size:13px;}
.emp-row-item:last-child{border-bottom:none;}
.pr-hidden,.pr-hidden *{color:#c0c0c0 !important;background:#c0c0c0 !important;border-radius:6px;user-select:none;}
.emp-row-label{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.3px;}
.emp-row-val{font-weight:700;color:var(--txt);}
.emp-row-val.gold{color:#b8923c;}
.emp-row-val.green{color:#1a7a40;}
.emp-row-val.blue{color:#2980b9;}
.emp-row-val.red{color:#c0392b;}
.emp-row-val.has{color:#7a5c20;}
.emp-vente-sep{background:rgba(184,146,60,.06);border-top:1px solid rgba(184,146,60,.15);padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-d);}
.emp-fiche-actions{display:flex;gap:8px;padding:10px 14px 14px;}
.emp-action-btn{flex:1;padding:11px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:700;-webkit-tap-highlight-color:transparent;}
.emp-action-btn:active{filter:brightness(.88);}
.emp-action-gold{background:linear-gradient(135deg,#c9a84c,#7a5c20);color:#fff;}
.emp-action-outline{background:rgba(184,146,60,.1);color:#7a5c20;border:1px solid rgba(184,146,60,.3)!important;}

/* Empty / not found */
.emp-empty{padding:32px 18px;text-align:center;font-size:12px;color:var(--muted);}
.emp-empty-ico{font-size:36px;opacity:.15;margin-bottom:10px;}
.emp-notfound{padding:22px 18px;text-align:center;}

/* Bottom bar minimal */
.emp-bottombar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid rgba(184,146,60,.18);
  display:flex;align-items:stretch;z-index:500;
  box-shadow:0 -1px 0 rgba(0,0,0,.06);
  height:calc(56px + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
}
.emp-bottom-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;background:none;border:none;cursor:pointer;
  color:#9a8e7e;font-size:10px;font-weight:500;
  text-decoration:none;-webkit-tap-highlight-color:transparent;
}
.emp-bottom-btn:active{opacity:.7;}
.emp-bottom-ico{font-size:22px;line-height:1;}
.emp-bottom-btn.emp-logout{color:#c0392b;}

/* Basket sheet */
.emp-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:498;}
.emp-sheet-overlay.open{display:block;}
.emp-sheet{
  position:fixed;bottom:calc(56px + env(safe-area-inset-bottom));left:0;right:0;
  background:#fff;border-radius:20px 20px 0 0;border-top:1px solid rgba(184,146,60,.25);
  z-index:499;max-height:70vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -8px 32px rgba(0,0,0,.14);
}
.emp-sheet.open{transform:translateY(0);}
.emp-sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;border-bottom:1px solid rgba(184,146,60,.1);flex-shrink:0;
}
.emp-sheet-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold-d);}
.emp-sheet-body{overflow-y:auto;padding:10px 14px 14px;flex:1;}

/* Basket item */
.bsk-item{background:var(--bg,#f8f4ee);border:1px solid rgba(184,146,60,.15);border-radius:12px;padding:12px;margin-bottom:10px;position:relative;}
.bsk-ref{font-size:16px;font-weight:900;font-family:monospace;color:var(--gold-d);}
.bsk-name{font-size:11px;color:var(--muted);margin-top:2px;margin-bottom:8px;}
.bsk-remove{position:absolute;top:10px;right:10px;background:transparent;border:none;color:rgba(231,76,60,.4);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:6px;}
.bsk-remove:active{color:#e74c3c;}
</style>
<link rel="stylesheet" href="/static/mobile.css">
<link rel="stylesheet" href="/static/theme.css">
</head>
<body>

<!-- Topbar -->
<div class="emp-topbar">
  <div class="emp-topbar-brand">
    <div class="emp-topbar-logo">T</div>
    <div class="emp-topbar-name">Trabelsi</div>
  </div>
  <div class="emp-topbar-actions">
    <button class="emp-topbar-btn" onclick="toggleBasketSheet()">
      🗂️<span class="emp-badge" id="basket-nav-count">0</span>
    </button>
  </div>
</div>

<!-- Basket Sheet -->
<div class="emp-sheet-overlay" id="emp-sheet-overlay" onclick="closeBasketSheet()"></div>
<div class="emp-sheet" id="emp-basket-sheet">
  <div class="emp-sheet-head">
    <div class="emp-sheet-title">🗂️ Session (<span id="emp-basket-count">0</span>)</div>
    <div style="display:flex;gap:8px;">
      <button onclick="copyBasket(this)" style="padding:5px 10px;border-radius:7px;border:1px solid rgba(184,146,60,.25);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;">📋</button>
      <button onclick="clearBasket()" style="padding:5px 10px;border-radius:7px;border:1px solid rgba(231,76,60,.25);background:transparent;color:#e74c3c;cursor:pointer;font-size:13px;">🗑️</button>
      <button onclick="closeBasketSheet()" style="padding:5px 10px;border-radius:7px;border:1px solid rgba(184,146,60,.15);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;">✕</button>
    </div>
  </div>
  <div class="emp-sheet-body" id="emp-basket-list"></div>
</div>


<div class="emp-content">

  <!-- Fiche Référence -->
  <div class="emp-card">
    <div class="emp-card-header">
      <span style="font-size:16px">🔍</span>
      <span class="emp-card-title">Fiche Référence</span>
    </div>
    <div class="emp-fiche-row">
      <input type="text" id="ref-input" inputmode="numeric"
        class="emp-fiche-input" placeholder="Numéro de référence..."
        ontouchstart="openNumpad()" onclick="openNumpad()"
        onkeydown="if(event.key==='Enter')search()">
      <button class="emp-fiche-btn" onclick="search()">🔍</button>
      <button class="emp-keep-btn" id="btn-garder" onclick="garder()" disabled>📌</button>
    </div>
    <div id="result">
      <div class="emp-empty">
        <div class="emp-empty-ico">💎</div>
        Entrez une référence pour afficher la fiche article
      </div>
    </div>
  </div>

</div>

<script>
function fmt(v,d=2){return v==null?'—':Number(v).toLocaleString('fr-FR',{maximumFractionDigits:d});}
function fmtN(v){return v==null?'—':Number(v).toLocaleString('fr-FR',{maximumFractionDigits:0});}
function fmtD(d){if(!d)return '—';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function togglePR(el){el.classList.toggle('pr-hidden');}

async function search(){
  const inp=document.getElementById('ref-input');
  const ref=inp.value.trim();
  if(!ref){return;}
  // Reset immédiatement le champ pour saisie suivante
  inp.value='';
  inp.focus();
  // empty state hidden via result content
  document.getElementById('result').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">⏳ Chargement…</div>';
  // result shown inline;

  try{
    const [stockRes, ventes, credits] = await Promise.all([
      fetch(`/api/articles/${ref}`).then(r=>r.json()),
      fetch('/api/ventes').then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch('/api/credits').then(r=>r.ok?r.json():[]).catch(()=>[])
    ]);
    // Map ref → Set de clients avec crédit ouvert
    const creditMap = new Map();
    credits.filter(c=>c.statut==='rien'||c.statut==='avance').forEach(c=>{
      const clientKey=(c.client||'').toLowerCase().trim();
      String(c.refs||'').match(/\d+/g)?.forEach(r=>{
        const rInt=parseInt(r);
        if(!creditMap.has(rInt)) creditMap.set(rInt,new Set());
        creditMap.get(rInt).add(clientKey);
      });
    });
    const refInt=parseInt(ref);
    if(!stockRes.error){
      const enCredit=creditMap.has(refInt)&&creditMap.get(refInt).size>0;
      renderStock(stockRes, enCredit);
      return;
    }
    // Chercher dans les vendus
    const found=ventes.filter(v=>v.ref==refInt);
    if(found.length>0){
      const lastVente=found[found.length-1];
      const clientKey=(lastVente.client||'').toLowerCase().trim();
      const enCredit=creditMap.has(refInt)&&creditMap.get(refInt).has(clientKey);
      renderVendu(lastVente, found.length, enCredit);
      return;
    }
    renderNotFound(ref);
  }catch(e){
    renderNotFound(ref);
  }
}

function renderStock(a, enCredit){
  currentArticle={ref:a.id,article:a.article,or_grs:a.or_grs,pa:a.pa,statut:'stock',d:a.d,em:a.em,r:a.r,s:a.s,em_clb:a.em_clb,rosaces:a.rosaces,p_fines:a.p_fines,perles:a.perles};
  const btnG=document.getElementById('btn-garder');
  if(btnG){btnG.disabled=basket.some(b=>b.ref===a.id);btnG.textContent='📌 Garder';}
  document.getElementById('result').innerHTML=`
<div class="emp-fiche-result"><div class="emp-fiche-card">
    <div class="emp-fiche-head">
      <div><div class="emp-fiche-ref">#${a.id}</div><div class="emp-fiche-nom">${a.article||'—'}</div></div>
      <span class="emp-fiche-badge badge-stock">✅ En Stock</span>
    </div>
    <div class="emp-fiche-photo-wrap"><img src="/api/photo/${a.id}" class="emp-fiche-photo" alt="Photo" onerror="this.parentElement.style.display='none'"></div>
    <div class="emp-fiche-rows">
      <div class="emp-row-item"><span class="emp-row-label">Date d'entrée</span><span class="emp-row-val">${fmtD(a.date)}</span></div>
      ${a.pa!=null?'<div class="emp-row-item" onclick="togglePR(this)" style="cursor:pointer;user-select:none;"><span class="emp-row-label">Prix de Revient</span><span class="emp-row-val green">'+fmtN(a.pa)+' MAD</span></div>':''}
      ${a.or_grs!=null?'<div class="emp-row-item"><span class="emp-row-label">OR (grs)</span><span class="emp-row-val gold">'+fmt(a.or_grs)+' grs</span></div>':''}
      ${a.d?'<div class="emp-row-item"><span class="emp-row-label">Diamants</span><span class="emp-row-val has">'+fmt(a.d)+' cts</span></div>':''}
      ${a.em?'<div class="emp-row-item"><span class="emp-row-label">Émeraudes</span><span class="emp-row-val has">'+fmt(a.em)+' cts</span></div>':''}
      ${a.r?'<div class="emp-row-item"><span class="emp-row-label">Rubis</span><span class="emp-row-val has">'+fmt(a.r)+' cts</span></div>':''}
      ${a.s?'<div class="emp-row-item"><span class="emp-row-label">Saphirs</span><span class="emp-row-val has">'+fmt(a.s)+' cts</span></div>':''}
      ${a.p_fines?'<div class="emp-row-item"><span class="emp-row-label">Pierres Fines</span><span class="emp-row-val has">'+fmt(a.p_fines)+'</span></div>':''}
      ${a.rosaces?'<div class="emp-row-item"><span class="emp-row-label">Rosaces</span><span class="emp-row-val has">'+fmt(a.rosaces)+'</span></div>':''}
      ${a.em_clb?'<div class="emp-row-item"><span class="emp-row-label">Ém. Colombie</span><span class="emp-row-val has">'+fmt(a.em_clb)+' cts</span></div>':''}
      ${a.perles?'<div class="emp-row-item"><span class="emp-row-label">Perles</span><span class="emp-row-val has">'+fmt(a.perles)+' grs</span></div>':''}
    </div>
  </div></div>`;
}

function renderVendu(v, nb, enCredit){
  currentArticle={ref:v.ref,article:v.article,or_grs:v.or_grs,pa:v.pa,statut:'vendu',d:v.d,em:v.em,r:v.r,s:v.s,em_clb:v.em_clb,rosaces:v.rosaces,p_fines:v.p_fines,perles:v.perles};
  const btnG=document.getElementById('btn-garder');
  if(btnG){btnG.disabled=basket.some(b=>b.ref===v.ref);btnG.textContent='📌 Garder';}
  const b=v.benef||0;
  const badgeHtml=enCredit
    ?'<span class="emp-fiche-badge badge-credit">💳 Paiement en cours</span>'
    :'<span class="emp-fiche-badge badge-vendu">🔴 Vendu'+(nb>1?' ('+nb+'x)':'')+'</span>';
  document.getElementById('result').innerHTML=`
<div class="emp-fiche-result"><div class="emp-fiche-card">
    <div class="emp-fiche-head">
      <div><div class="emp-fiche-ref">#${v.ref}</div><div class="emp-fiche-nom">${v.article||'—'}</div></div>
      ${badgeHtml}
    </div>
    <div class="emp-fiche-photo-wrap"><img src="/api/photo/${v.ref}" class="emp-fiche-photo" alt="Photo" onerror="this.parentElement.style.display='none'"></div>
    <div class="emp-vente-sep">Infos article</div>
    <div class="emp-fiche-rows">
      ${v.pa!=null?'<div class="emp-row-item" onclick="togglePR(this)" style="cursor:pointer;user-select:none;"><span class="emp-row-label">Prix de Revient</span><span class="emp-row-val green">'+fmtN(v.pa)+' MAD</span></div>':''}
      ${v.or_grs!=null?'<div class="emp-row-item"><span class="emp-row-label">OR (grs)</span><span class="emp-row-val gold">'+fmt(v.or_grs)+' grs</span></div>':''}
      ${v.d?'<div class="emp-row-item"><span class="emp-row-label">Diamants</span><span class="emp-row-val has">'+fmt(v.d)+' cts</span></div>':''}
      ${v.em?'<div class="emp-row-item"><span class="emp-row-label">Émeraudes</span><span class="emp-row-val has">'+fmt(v.em)+' cts</span></div>':''}
      ${v.r?'<div class="emp-row-item"><span class="emp-row-label">Rubis</span><span class="emp-row-val has">'+fmt(v.r)+' cts</span></div>':''}
      ${v.s?'<div class="emp-row-item"><span class="emp-row-label">Saphirs</span><span class="emp-row-val has">'+fmt(v.s)+' cts</span></div>':''}
      ${v.em_clb?'<div class="emp-row-item"><span class="emp-row-label">Ém. Colombie</span><span class="emp-row-val has">'+fmt(v.em_clb)+' cts</span></div>':''}
      ${v.perles?'<div class="emp-row-item"><span class="emp-row-label">Perles</span><span class="emp-row-val has">'+fmt(v.perles)+' grs</span></div>':''}
    </div>
    <div class="emp-vente-sep">Vente</div>
    <div class="emp-fiche-rows">
      <div class="emp-row-item"><span class="emp-row-label">Date de vente</span><span class="emp-row-val blue">${fmtD(v.date_vente)}</span></div>
      ${v.pv!=null?'<div class="emp-row-item"><span class="emp-row-label">Prix de Vente</span><span class="emp-row-val blue">'+fmtN(v.pv)+' MAD</span></div>':''}
      <div class="emp-row-item"><span class="emp-row-label">Bénéfice</span><span class="emp-row-val ${b>=0?'green':'red'}">${fmtN(b)} MAD</span></div>
      ${v.client?'<div class="emp-row-item"><span class="emp-row-label">Client</span><span class="emp-row-val">'+v.client+'</span></div>':''}
    </div>
  </div></div>`;
}

function renderNotFound(ref){
  currentArticle=null;
  const btnG=document.getElementById('btn-garder');
  if(btnG){btnG.disabled=true;btnG.textContent='📌 Garder';}
  document.getElementById('result').innerHTML='<div class="emp-notfound"><div style="font-size:32px;opacity:.2;margin-bottom:10px;">🔍</div><div style="font-size:14px;font-weight:600;margin-bottom:6px;">Référence introuvable</div><div style="font-size:12px;color:var(--muted)">Aucun article pour la référence <strong>#'+ref+'</strong></div></div>';
}

function clearResult(){
  document.getElementById('ref-input').value='';
  document.getElementById('result').innerHTML='<div class="emp-empty"><div class="emp-empty-ico">💎</div>Entrez une référence pour afficher la fiche article</div>';
  currentArticle=null;
  const btnG=document.getElementById('btn-garder');
  if(btnG){btnG.disabled=true;btnG.textContent='📌';}
}

// Auto-search si ref dans l'URL
const urlRef=new URLSearchParams(window.location.search).get('ref');
if(urlRef){
  document.getElementById('ref-input').value=urlRef;
  search();
}

/* ────────────────────────────────────────────────────────
   HISTORIQUE SESSION — DROPDOWN NAV
   ──────────────────────────────────────────────────────── */
let basket=[];
let currentArticle=null;

function garder(){
  if(!currentArticle)return;
  if(basket.some(b=>b.ref===currentArticle.ref)){
    const btn=document.getElementById('btn-garder');
    if(btn){const t=btn.textContent;btn.textContent='⚠️ Déjà gardé';setTimeout(()=>{btn.textContent=t;},1200);}
    return;
  }
  basket.unshift(Object.assign({},currentArticle,{pv_oral:''})); // plus récent en haut
  const btn=document.getElementById('btn-garder');
  if(btn){btn.disabled=true;btn.textContent='✅ Gardé';}
  renderBasket();
}

function renderBasket(){
  // Badge nav
  const badge=document.getElementById('basket-nav-count');
  const countEl=document.getElementById('emp-basket-count');
  if(badge){badge.style.display=basket.length?'block':'none';badge.textContent=basket.length;}
  if(countEl)countEl.textContent=basket.length;
  // Contenu dropdown
  document.getElementById('emp-basket-list').innerHTML=basket.length===0
    ?'<div style="text-align:center;padding:28px 0;color:var(--muted);font-size:13px">Aucun article gardé</div>'
    :basket.map((item,idx)=>`
    <div class="basket-item">
      <button class="basket-remove" onclick="removeBasket(${idx})">✕</button>
      <div style="display:flex;gap:9px;align-items:flex-start;margin-bottom:8px;padding-right:22px">
        <img src="/api/photo/${item.ref}" style="width:48px;height:48px;object-fit:contain;border-radius:6px;background:var(--bg2);border:1px solid var(--bd);flex-shrink:0" onerror="this.style.display='none'">
        <div style="min-width:0">
          <div class="basket-ref">#${item.ref}</div>
          <div class="basket-name">${item.article||'—'}</div>
          <div style="font-size:10px;font-weight:600;color:${item.statut==='stock'?'var(--green)':'var(--red)'}">${item.statut==='stock'?'✅ En Stock':'🔴 Vendu'}</div>
        </div>
      </div>
      ${(()=>{
        const rows=[];
        if(item.or_grs) rows.push({ico:'🥇',lbl:'OR',val:fmt(item.or_grs),unit:'grs'});
        if(item.d)      rows.push({ico:'💎',lbl:'Diamants',val:fmt(item.d),unit:'cts'});
        if(item.em)     rows.push({ico:'🟢',lbl:'Émeraudes',val:fmt(item.em),unit:'cts'});
        if(item.r)      rows.push({ico:'🔴',lbl:'Rubis',val:fmt(item.r),unit:'cts'});
        if(item.s)      rows.push({ico:'🔵',lbl:'Saphirs',val:fmt(item.s),unit:'cts'});
        if(item.em_clb) rows.push({ico:'💚',lbl:'Ém. Colombie',val:fmt(item.em_clb),unit:'cts'});
        if(item.rosaces)rows.push({ico:'🌸',lbl:'Rosaces',val:fmt(item.rosaces),unit:''});
        if(item.p_fines)rows.push({ico:'🪨',lbl:'P. Fines',val:fmt(item.p_fines),unit:''});
        if(item.perles) rows.push({ico:'⚪',lbl:'Perles',val:fmt(item.perles),unit:'grs'});
        if(!rows.length)return '';
        return '<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:8px;padding:7px 9px;background:var(--bg2);border:1px solid var(--bd);border-radius:7px">'+
          rows.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px"><span style="color:var(--muted)">${p.ico} ${p.lbl}</span><span style="font-weight:700;color:var(--txt)">${p.val}${p.unit?' '+p.unit:''}</span></div>`).join('')+
          '</div>';
      })()}
      <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
        <button onclick="togglePA(${idx})" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--bd);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;justify-content:center;letter-spacing:1px;line-height:1" title="">···</button>
      </div>
      <div id="bpa-${idx}" style="display:none;padding:6px 10px;background:var(--bg2);border:1px solid var(--bd);border-radius:7px;font-size:14px;font-weight:700;color:var(--gold-l);text-align:center;margin-bottom:8px">${item.pa!=null?fmtN(item.pa)+' MAD':'—'}</div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">P.V donné oralement</div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" placeholder="0" min="0" value="${item.pv_oral||''}"
          oninput="basket[${idx}].pv_oral=this.value"
          style="flex:1;padding:7px 10px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:7px;color:var(--txt);font-size:14px;font-weight:700;outline:none;min-width:0;transition:border-color .15s"
          onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--bd)'">
        <span style="font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600">MAD</span>
      </div>
    </div>`).join('');
}

function toggleBasketSheet(){
  var sheet=document.getElementById('emp-basket-sheet');
  var ov=document.getElementById('emp-sheet-overlay');
  var open=sheet.classList.toggle('open');
  ov.classList.toggle('open',open);
}
function closeBasketSheet(){
  document.getElementById('emp-basket-sheet').classList.remove('open');
  document.getElementById('emp-sheet-overlay').classList.remove('open');
}

function removeBasket(idx){
  const ref=basket[idx]?.ref;
  basket.splice(idx,1);
  renderBasket();
  if(currentArticle&&currentArticle.ref===ref){
    const btn=document.getElementById('btn-garder');
    if(btn){btn.disabled=false;btn.textContent='📌 Garder';}
  }
}

function clearBasket(){
  basket=[];
  renderBasket();
  closeBasketSheet();
  const btn=document.getElementById('btn-garder');
  if(btn){btn.disabled=currentArticle===null;btn.textContent='📌 Garder';}
}

function togglePA(idx){
  const el=document.getElementById('bpa-'+idx);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function toggleBasketSheet(){
  var sheet=document.getElementById('emp-basket-sheet');
  var ov=document.getElementById('emp-sheet-overlay');
  var open=sheet.classList.toggle('open');
  ov.classList.toggle('open',open);
}
function closeBasketSheet(){
  document.getElementById('emp-basket-sheet').classList.remove('open');
  document.getElementById('emp-sheet-overlay').classList.remove('open');
}
function copyBasket(el){
  if(!basket.length)return;
  const lines=basket.map(item=>{
    const pv=item.pv_oral?fmtN(parseFloat(item.pv_oral))+' MAD':'non renseigné';
    return `#${item.ref} – ${item.article||'?'}${item.or_grs?' ('+fmt(item.or_grs)+'g OR)':''} → P.V: ${pv}`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const orig=el.textContent;el.textContent='✅';
    setTimeout(()=>{el.textContent=orig;},1500);
  });
}

</script>

<!-- ── PAVÉ NUMÉRIQUE CUSTOM ── -->
<style>
#numpad-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;
  align-items:flex-end;justify-content:center;
}
#numpad-overlay.open{display:flex;}
#numpad-box{
  width:100%;max-width:480px;
  background:#1c1612;
  border-radius:20px 20px 0 0;
  padding:0 0 env(safe-area-inset-bottom,12px);
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  animation:slideUp .22s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#numpad-display{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,.08);
}
#numpad-val{
  font-size:32px;font-weight:900;color:#c9a84c;
  letter-spacing:4px;font-family:monospace;min-width:140px;
}
#numpad-val:empty::after{content:'_ _ _ _';opacity:.3;font-size:22px;}
#numpad-lbl{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;}
#numpad-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:6px;padding:10px 12px;
}
.nk{
  background:rgba(255,255,255,.08);border:none;border-radius:12px;
  color:#fff;font-size:24px;font-weight:700;padding:18px 0;
  cursor:pointer;transition:background .12s, transform .08s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.nk:active,.nk.pressed{background:rgba(201,168,76,.45);transform:scale(.88);box-shadow:0 0 0 3px rgba(201,168,76,.3);}
.nk.back{background:rgba(231,76,60,.15);color:#e74c3c;font-size:20px;}
.nk.back:active,.nk.back.pressed{background:rgba(231,76,60,.5);transform:scale(.88);}
.nk.ok{
  background:linear-gradient(135deg,#c9a84c,#9a7530);color:#1a1200;
  font-size:16px;font-weight:800;letter-spacing:.5px;
}
.nk.ok:active,.nk.ok.pressed{filter:brightness(1.3);transform:scale(.94);box-shadow:0 0 0 4px rgba(201,168,76,.4);}
.nk.cancel{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-size:14px;}
.nk.cancel:active,.nk.cancel.pressed{background:rgba(255,255,255,.15);}
</style>

<div id="numpad-overlay" onclick="if(event.target===this)closeNumpad()">
  <div id="numpad-box">
    <div id="numpad-display">
      <div>
        <div id="numpad-lbl">Référence article</div>
        <div id="numpad-val"></div>
      </div>
    </div>
    <div id="numpad-grid">
      <button class="nk" onclick="npKey('1')">1</button>
      <button class="nk" onclick="npKey('2')">2</button>
      <button class="nk" onclick="npKey('3')">3</button>
      <button class="nk" onclick="npKey('4')">4</button>
      <button class="nk" onclick="npKey('5')">5</button>
      <button class="nk" onclick="npKey('6')">6</button>
      <button class="nk" onclick="npKey('7')">7</button>
      <button class="nk" onclick="npKey('8')">8</button>
      <button class="nk" onclick="npKey('9')">9</button>
      <button class="nk cancel" onclick="closeNumpad()">Annuler</button>
      <button class="nk zero" onclick="npKey('0')">0</button>
      <button class="nk back" onclick="npBack()">⌫</button>
    </div>
    <div style="padding:0 12px 10px;display:grid;grid-template-columns:1fr">
      <button class="nk ok" onclick="npConfirm()">🔍 Rechercher</button>
    </div>
  </div>
</div>

<script>
let _npVal = '';

function openNumpad(){
  if(window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
  _npVal = document.getElementById('ref-input').value || '';
  document.getElementById('numpad-val').textContent = _npVal;
  document.getElementById('numpad-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeNumpad(){
  document.getElementById('numpad-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function npKey(d){
  if(_npVal.length >= 6) return;
  _npVal += d;
  document.getElementById('numpad-val').textContent = _npVal;
  document.getElementById('ref-input').value = _npVal;
}

function npBack(){
  _npVal = _npVal.slice(0,-1);
  document.getElementById('numpad-val').textContent = _npVal;
  document.getElementById('ref-input').value = _npVal;
}

function npConfirm(){
  if(!_npVal) return;
  document.getElementById('ref-input').value = _npVal;
  closeNumpad();
  search();
}

// ── Feedback tactile sur iOS (active state) ──
document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('.nk').forEach(btn => {
    btn.addEventListener('touchstart', function(e){
      this.classList.add('pressed');
      // Vibration légère si supportée (Android)
      if(navigator.vibrate) navigator.vibrate(8);
    }, {passive:true});
    btn.addEventListener('touchend',   function(){ this.classList.remove('pressed'); }, {passive:true});
    btn.addEventListener('touchcancel',function(){ this.classList.remove('pressed'); }, {passive:true});
  });
});
</script>
<script src="/static/mobile.js"></script>
