<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galerie — Trabelsi</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#C4A35A;--gold-l:#9A7A3A;
  --bg:#FAFAF8;--bg2:#FFFFFF;--bg3:#F5F4F0;
  --bd:rgba(10,10,10,0.09);--txt:#0A0A0A;--muted:#888880;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}

/* ── NAV ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:62px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;}
.nav-logo{width:32px;height:32px;background:#0A0A0A;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Playfair Display',serif;font-size:15px;font-weight:600;flex-shrink:0;}
.nav-title{font-family:'Playfair Display',serif;font-weight:500;letter-spacing:3px;font-size:13px;color:var(--txt);text-transform:uppercase;margin-left:10px;}
.nav-center{display:flex;align-items:center;gap:4px;flex:1;justify-content:center;flex-wrap:wrap;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:5px 9px;border-radius:4px;transition:color .15s,background .15s;}
.nav-links a:hover{color:var(--gold);background:rgba(196,163,90,0.08);}
.nav-links a.active{color:var(--gold);background:rgba(196,163,90,0.10);border:1px solid rgba(196,163,90,0.22);}
.nav-dropdown{position:relative;}
.nav-dropdown-btn{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;padding:5px 9px;border-radius:4px;display:flex;align-items:center;gap:4px;transition:color .15s;}
.nav-dropdown-btn:hover,.nav-dropdown.open .nav-dropdown-btn{color:var(--gold);}
.nav-dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.10);z-index:200;padding:4px;}
.nav-dropdown.open .nav-dropdown-menu{display:block;}
.nav-dropdown-menu a{display:block;padding:7px 12px;font-size:12px;color:var(--txt);text-decoration:none;border-radius:4px;transition:background .12s;}
.nav-dropdown-menu a:hover{background:rgba(196,163,90,0.08);color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-logout-btn{font-size:11px;letter-spacing:1px;color:var(--muted);text-decoration:none;padding:5px 9px;border-radius:4px;}
.nav-logout-btn:hover{color:var(--gold);}

/* ── TOOLBAR ── */
.toolbar{padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.toolbar-left{display:flex;gap:6px;flex-wrap:wrap;}
.filter-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.filter-pill:hover{border-color:var(--gold);color:var(--gold);}
.filter-pill.active{background:#0A0A0A;border-color:#0A0A0A;color:var(--gold);}
.search-box{flex:1;min-width:180px;max-width:320px;position:relative;}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--bd);border-radius:20px;background:var(--bg3);color:var(--txt);font-size:13px;outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--gold);}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;}
.toolbar-count{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap;}

/* ── GALERIE GRID ── */
.gallery-wrap{padding:24px;}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}
@media(max-width:600px){
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .gallery-wrap{padding:12px;}
}

/* ── CARTE ARTICLE ── */
.art-card{
  background:var(--bg2);
  border:1px solid var(--bd);
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .15s, transform .15s, box-shadow .15s;
  text-decoration:none;
  display:block;
  color:inherit;
}
.art-card:hover{
  border-color:rgba(196,163,90,0.45);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}
.art-photo{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  background:var(--bg3);
  display:block;
}
.art-no-photo{
  width:100%;
  aspect-ratio:1/1;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  opacity:.35;
}
.art-info{padding:9px 10px 10px;}
.art-ref{
  font-family:'Playfair Display',serif;
  font-size:13px;
  font-weight:500;
  color:var(--txt);
  letter-spacing:.5px;
}
.art-name{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.art-badge-new{
  display:inline-block;
  font-size:8px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  background:rgba(196,163,90,0.12);
  color:var(--gold-l);
  border:1px solid rgba(196,163,90,0.25);
  border-radius:3px;
  padding:2px 6px;
  margin-top:4px;
}
.art-badge-vendu{
  display:inline-block;
  font-size:8px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  background:rgba(239,68,68,0.08);
  color:#DC2626;
  border:1px solid rgba(239,68,68,0.2);
  border-radius:3px;
  padding:2px 6px;
  margin-top:4px;
}
.art-card-vendu .art-photo,
.art-card-vendu .art-no-photo{
  opacity:0.55;
}

/* ── ÉTATS ── */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-state .ico{font-size:48px;opacity:.4;margin-bottom:16px;}
.empty-state p{font-size:14px;}
.loading-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
.skel{background:var(--bg3);border-radius:8px;aspect-ratio:1/1;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* ── DARK MODE ── */
html.dark body{background:#0F0F0D!important;color:#F0EFE8!important;}
html.dark nav,html.dark .toolbar{background:#141412!important;border-color:rgba(255,255,255,0.07)!important;}
html.dark .art-card{background:#1A1A17!important;border-color:rgba(255,255,255,0.07)!important;}
html.dark .art-card:hover{border-color:rgba(196,163,90,0.4)!important;}
html.dark .art-no-photo,html.dark .art-photo[src=""],html.dark .skel{background:#242420!important;}
html.dark .art-ref{color:#F0EFE8!important;}
html.dark .filter-pill{border-color:rgba(255,255,255,0.10)!important;color:#7A7A72!important;}
html.dark .filter-pill:hover{border-color:var(--gold)!important;color:var(--gold)!important;}
html.dark .filter-pill.active{background:var(--gold)!important;border-color:var(--gold)!important;color:#0A0A0A!important;}
html.dark .search-box input{background:#1A1A17!important;border-color:rgba(255,255,255,0.10)!important;color:#F0EFE8!important;}
html.dark .nav-dropdown-menu{background:#1A1A17!important;border-color:rgba(255,255,255,0.08)!important;}
html.dark .nav-dropdown-menu a{color:#F0EFE8!important;}
html.dark .nav-links a{color:#7A7A72!important;}
html.dark .nav-links a.active{color:var(--gold)!important;}
html.dark .nav-title{color:#F0EFE8!important;}
html.dark .toolbar-count{color:#7A7A72!important;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div style="display:flex;align-items:center;">
    <a href="/accueil" style="text-decoration:none;display:flex;align-items:center;gap:10px;">
      <div class="nav-logo">T</div>
      <span class="nav-title">Gestion Stock</span>
    </a>
  </div>

  <div class="nav-links" style="flex:1;justify-content:center;display:flex;gap:4px;">
    <a href="/dashboard">Dashboard</a>

    <div class="nav-dropdown" id="dd-stock">
      <button class="nav-dropdown-btn" onclick="toggleDD('dd-stock')">📦 Stock ▾</button>
      <div class="nav-dropdown-menu">
        <a href="/stock">Stock & Articles</a>
        <a href="/ajouter">Ajouter article</a>
        <a href="/vendu">Articles vendus</a>
        <a href="/fiche">Fiche référence</a>
        <a href="/galerie" class="active">📷 Galerie photos</a>
        <a href="/catalogue">Catalogue</a>
      </div>
    </div>

    <div class="nav-dropdown" id="dd-ventes">
      <button class="nav-dropdown-btn" onclick="toggleDD('dd-ventes')">💰 Ventes ▾</button>
      <div class="nav-dropdown-menu">
        <a href="/vente">Nouvelle vente</a>
        <a href="/facture">Facture</a>
        <a href="/facture-libre">Facture libre</a>
        <a href="/devis">Devis</a>
        <a href="/historique-devis">Historique Devis</a>
      </div>
    </div>

    <div class="nav-dropdown" id="dd-clients">
      <button class="nav-dropdown-btn" onclick="toggleDD('dd-clients')">👥 Clients ▾</button>
      <div class="nav-dropdown-menu">
        <a href="/clients">Dossier clients</a>
        <a href="/credit">Crédits</a>
        <a href="/cheques">Chèques</a>
      </div>
    </div>

    <div class="nav-dropdown" id="dd-gestion">
      <button class="nav-dropdown-btn" onclick="toggleDD('dd-gestion')">⚙️ Gestion ▾</button>
      <div class="nav-dropdown-menu">
        <a href="/historique-activite">Historique activité</a>
        <a href="/fournisseurs">Fournisseurs</a>
        <a href="/dashboard">Dashboard</a>
      </div>
    </div>
  </div>

  <div class="nav-right">
    <a href="/logout" class="nav-logout-btn">⎋ Déconnexion</a>
  </div>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <button class="filter-pill active" data-filter="all" onclick="setFilter('all',this)">📷 Tout</button>
    <button class="filter-pill" data-filter="stock" onclick="setFilter('stock',this)">✅ En stock</button>
    <button class="filter-pill" data-filter="vendu" onclick="setFilter('vendu',this)">🏷 Vendu</button>
    <button class="filter-pill" data-filter="new" onclick="setFilter('new',this)">✨ Derniers ajouts</button>
  </div>
  <select id="g-type" onchange="applyFilters()"
    style="padding:7px 12px;border:1px solid var(--bd);border-radius:20px;background:var(--bg3);color:var(--txt);font-size:12px;font-weight:600;outline:none;cursor:pointer;">
    <option value="">Tous les types</option>
  </select>
  <div class="search-box">
    <input type="text" id="g-search" placeholder="Réf ou article…" oninput="applyFilters()">
  </div>
  <span class="toolbar-count" id="g-count"></span>
</div>

<!-- GALERIE -->
<div class="gallery-wrap">
  <div class="gallery-grid" id="g-grid">
    <!-- Skeletons chargement -->
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════
   ÉTAT
═══════════════════════════════ */
let _allArticles = [];
let _hasPhoto    = {};   // ref → true/false (on le découvre au chargement des images)
let _activeFilter = 'all';
const NEW_DAYS = 30;     // "Derniers ajouts" = articles ajoutés dans les 30 derniers jours

/* ═══════════════════════════════
   CHARGEMENT
═══════════════════════════════ */
async function loadGallery() {
  try {
    const res = await fetch('/api/articles');
    const data = await res.json();
    // Trier par date décroissante (plus récents en premier)
    _allArticles = data.sort((a,b) => {
      const da = a.date || '', db = b.date || '';
      return db.localeCompare(da);
    });
    populateTypes();
    applyFilters();
  } catch(e) {
    document.getElementById('g-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="ico">⚠️</div><p>Erreur de chargement</p>
      </div>`;
  }
}

/* ═══════════════════════════════
   FILTRES
═══════════════════════════════ */
function setFilter(f, btn) {
  _activeFilter = f;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilters();
}

function populateTypes() {
  const sel = document.getElementById('g-type');
  if(!sel) return;
  const types = [...new Set(_allArticles.map(a => (a.article||'').trim()).filter(Boolean))].sort();
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tous les types</option>' +
    types.map(t => `<option value="${t.replace(/"/g,'&quot;')}">${t}</option>`).join('');
  sel.value = cur;
}

function applyFilters() {
  const q = (document.getElementById('g-search').value || '').toLowerCase().trim();
  const typeF = (document.getElementById('g-type') || {}).value || '';
  const today = new Date();
  const cutoff = new Date(today);
  cutoff.setDate(cutoff.getDate() - NEW_DAYS);
  const cutStr = cutoff.toISOString().slice(0,10);

  let list = _allArticles;

  // Filtre type
  if(_activeFilter === 'stock') {
    list = list.filter(a => (parseInt(a.quantite) || 0) >= 1);
  } else if(_activeFilter === 'vendu') {
    list = list.filter(a => (parseInt(a.quantite) || 0) === 0);
  } else if(_activeFilter === 'new') {
    list = list.filter(a => (a.date||'') >= cutStr);
  }

  // Filtre par type d'article
  if(typeF) {
    list = list.filter(a => (a.article||'').trim() === typeF);
  }

  // Recherche texte
  if(q) {
    list = list.filter(a =>
      String(a.id).includes(q) ||
      (a.article||'').toLowerCase().includes(q)
    );
  }

  // Exclure quantité 0 (optionnel — commenter pour tout voir)
  // list = list.filter(a => (a.quantite||1) > 0);

  renderGrid(list, cutStr);
}

/* ═══════════════════════════════
   RENDU
═══════════════════════════════ */
function renderGrid(list, cutStr) {
  const grid = document.getElementById('g-grid');
  document.getElementById('g-count').textContent = `${list.length} article${list.length>1?'s':''}`;

  if(!list.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="ico">📷</div>
        <p>Aucun article trouvé</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(a => {
    const isNew  = (a.date||'') >= cutStr;
    const isSold = (parseInt(a.quantite) || 0) === 0;
    return `
    <a class="art-card ${isSold ? 'art-card-vendu' : ''}" href="/fiche?ref=${a.id}" title="Réf ${a.id} — ${a.article||''}">
      <img
        class="art-photo"
        src="/api/photo/${a.id}"
        alt="Réf ${a.id}"
        loading="lazy"
        onerror="onPhotoError(this,${a.id})"
        onload="onPhotoLoad(${a.id})"
      >
      <div class="art-info">
        <div class="art-ref">#${a.id}</div>
        <div class="art-name">${a.article||'—'}</div>
        ${isSold ? '<span class="art-badge-vendu">Vendu</span>' : (isNew ? '<span class="art-badge-new">Nouveau</span>' : '')}
      </div>
    </a>`;
  }).join('');
}

function onPhotoError(img, ref) {
  _hasPhoto[ref] = false;
  // Remplacer par placeholder diamant
  const wrap = img.parentElement;
  const noPhoto = document.createElement('div');
  noPhoto.className = 'art-no-photo';
  noPhoto.textContent = '💎';
  wrap.replaceChild(noPhoto, img);
  // pas besoin de masquer selon filtre ici
}

function onPhotoLoad(ref) {
  _hasPhoto[ref] = true;
}

/* ═══════════════════════════════
   NAV DROPDOWNS
═══════════════════════════════ */
function toggleDD(id) {
  const el = document.getElementById(id);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
  if(!wasOpen) el.classList.add('open');
}
document.addEventListener('click', e => {
  if(!e.target.closest('.nav-dropdown')) {
    document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
  }
});

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
loadGallery();
</script>

<link rel="stylesheet" href="/static/theme.css">
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/static/sw.js");}</script>
<script src="/static/notifications.js"></script>
<script src="/static/mobile.js"></script>
</body>
</html>
